<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Calculator</title>
</head>
<body>

    <h2>Enter Student Details</h2>
    <form id="marksForm">
        <label>Name: <input type="text" id="nameInput" required></label><br><br>
        <label>Mark 1: <input type="number" id="m1" required></label><br><br>
        <label>Mark 2: <input type="number" id="m2" required></label><br><br>
        <label>Mark 3: <input type="number" id="m3" required></label><br><br>
        <button type="submit">Calculate</button>
    </form>

    <hr>

    <div id="resultDisplay"></div>

    <script src="script.js"></script>
</body>
</html>
